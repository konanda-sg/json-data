<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>@SportsEera~JW</title>

<!-- JW Player -->
<script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:system-ui,-apple-system,sans-serif;
}

#player{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* 🔥 WATERMARK */
#watermark{
  position:absolute;
  bottom:12%;
  left:6%;
  z-index:9999;
  pointer-events:none;

  color:#000;
  font-size:12px;
  font-weight:800;
  letter-spacing:1px;

  text-shadow:
    0 0 2px rgba(255,255,255,.35),
    0 0 6px rgba(0,0,0,.9);

  user-select:none;
  white-space:nowrap;
}

/* 🔘 FIT / COVER BUTTON */
#fitBtn{
  position:absolute;
  bottom:70px;
  right:14px;
  z-index:9999;

  background:rgba(0,0,0,.6);
  color:#fff;
  border:none;
  border-radius:6px;
  padding:8px 10px;
  font-size:12px;
  cursor:pointer;
  opacity:.85;
}
#fitBtn:active{transform:scale(.95)}
</style>
</head>

<body>
<div id="player"></div>

<!-- overlays -->
<div id="watermark">✈️ @SportsEera</div>
<button id="fitBtn">FIT</button>

<script>
/* ---------- helpers ---------- */
const qp = k => new URLSearchParams(location.search).get(k);

/* ---------- params ---------- */
const id  = qp("id");
const url = qp("url");
const jsonUrl = "https://eerajson.pages.dev/Data/m3u8.json"; // 🔁 apna JSON path yahan

async function getSource(){
  if(url) return url;          // ?url= priority
  if(!id) return null;         // kuch bhi nahi

  const r = await fetch(jsonUrl);
  const j = await r.json();
  if(!j[id]) return null;

  return j[id].url;
}

(async()=>{
  const src = await getSource();
  if(!src){
    alert("Use ?id= or ?url=");
    return;
  }

  /* ---------- init jw ---------- */
  jwplayer("player").setup({
    file: src,
    type: "hls",
    autostart: true,
    mute: false,
    width: "100%",
    height: "100%",
    stretching: "uniform",   // FIT default
    controls: true
  });

  /* ---------- FIT / COVER ---------- */
  let isCover = false;
  document.getElementById("fitBtn").onclick = () => {
    isCover = !isCover;
    jwplayer().setConfig({
      stretching: isCover ? "fill" : "uniform"
    });
    document.getElementById("fitBtn").innerText = isCover ? "COVER" : "FIT";
  };

  /* ---------- force overlays inside player ---------- */
  jwplayer().on("ready", () => {
    const container = document.getElementById("player");
    container.appendChild(document.getElementById("watermark"));
    container.appendChild(document.getElementById("fitBtn"));
  });

})();
</script>
</body>
</html>
