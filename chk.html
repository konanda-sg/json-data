<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>@SportsEera~JW</title>

<!-- JW Player -->
<script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:system-ui,-apple-system,sans-serif;
}

#player{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* WATERMARK */
#watermark{
  position:absolute;
  top:60%;
  left:10%;
  z-index:10;
  pointer-events:none;
  color:rgba(0,0,0,1);   /* black transparent */
  text-shadow:0 0 4px rgba(255,255,255,.15); /* halka glow so visible rahe */
  font-size:10px;
  font-weight:950;
  letter-spacing:1px;
  text-shadow:0 0 6px rgba(0,0,0,.6);
  user-select:none
}

/* 🔘 FIT BUTTON (JW STYLE) */
#fitBtn{
  background:transparent;
  color:#fff;
  border:none;
  font-size:13px;
  font-weight:700;
  padding:6px 8px;
  cursor:pointer;
  opacity:.9;
}
#fitBtn:hover{opacity:1}
</style>
</head>

<body>
<div id="player"></div>

<!-- overlays -->
<div id="watermark">@SportsEera</div>
<button id="fitBtn">FIT</button>

<script>
/* ---------- helpers ---------- */
const qp = k => new URLSearchParams(location.search).get(k);

/* ---------- params ---------- */
const id  = qp("id");
const url = qp("url");
const jsonUrl = "https://eerajson.pages.dev/Data/m3u8.json";   // 🔁 apna JSON path yahan

async function getSource(){
  if(url) return url;          // ?url= priority
  if(!id) return null;

  const r = await fetch(jsonUrl);
  const j = await r.json();
  if(!j[id]) return null;

  return j[id].url;
}

(async()=>{
  const src = await getSource();
  if(!src){
    alert("Use ?id= or ?url=");
    return;
  }

  /* ---------- init jw ---------- */
  jwplayer("player").setup({
    file: src,
    type: "hls",
    autostart: true,
    mute: false,
    width: "100%",
    height: "100%",
    stretching: "uniform",   // FIT default
    controls: true
  });

  /* ---------- FIT / COVER LOGIC ---------- */
  let isCover = false;
  document.getElementById("fitBtn").onclick = () => {
    isCover = !isCover;
    jwplayer().setConfig({
      stretching: isCover ? "fill" : "uniform"
    });
    document.getElementById("fitBtn").innerText = isCover ? "COVER" : "FIT";
  };

  /* ---------- inject watermark + FIT into player ---------- */
  jwplayer().on("ready", () => {
    const container = document.getElementById("player");
    container.appendChild(document.getElementById("watermark"));

    injectFitButton();
  });

})();

/* ---------- inject FIT button into JW control bar ---------- */
function injectFitButton(){
  const interval = setInterval(() => {
    const rightControls = document.querySelector(".jw-controlbar-right-group");
    if(!rightControls) return;

    clearInterval(interval);

    const btn = document.getElementById("fitBtn");
    rightControls.insertBefore(
      btn,
      rightControls.querySelector(".jw-icon-fullscreen")
    );
  }, 300);
}
</script>
</body>
</html>
