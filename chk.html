<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>@SportsEera~JW</title>

<script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:system-ui,-apple-system,sans-serif;
}

#player{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* WATERMARK */
#watermark{
  position:absolute;
  top:60%;
  left:10%;
  z-index:10;
  pointer-events:none;
  color:rgba(0,0,0,1);   /* black transparent */
  text-shadow:0 0 4px rgba(255,255,255,.15); /* halka glow so visible rahe */
  font-size:10px;
  font-weight:950;
  letter-spacing:1px;
  text-shadow:0 0 6px rgba(0,0,0,.6);
  user-select:none
}

/* 🔘 JW FIT BUTTON (PLYR STYLE) */
.jw-fit-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  width:40px;
  height:40px;
  cursor:pointer;
  opacity:.85;
}
.jw-fit-btn:hover{opacity:1}
.jw-fit-btn svg{width:20px;height:20px;fill:#fff}
</style>
</head>

<body>
<div id="player"></div>
<div id="watermark">@SportsEera</div>

<script>
/* ---------- helpers ---------- */
const qp = k => new URLSearchParams(location.search).get(k);

/* ---------- params ---------- */
const id  = qp("id");
const url = qp("url");
const jsonUrl = "streams.json"; // apna JSON

async function getSource(){
  if(url) return url;
  if(!id) return null;
  const r = await fetch(jsonUrl);
  const j = await r.json();
  return j[id]?.url || null;
}

(async()=>{
  const src = await getSource();
  if(!src){
    alert("Use ?id= or ?url=");
    return;
  }

  jwplayer("player").setup({
    file: src,
    type: "hls",
    autostart: true,
    width: "100%",
    height: "100%",
    stretching: "uniform",
    controls: true
  });

  /* ---------- watermark inside player ---------- */
  jwplayer().on("ready", () => {
    document.getElementById("player")
      .appendChild(document.getElementById("watermark"));

    injectFitButton();
  });

  /* ---------- re-inject on fullscreen ---------- */
  jwplayer().on("fullscreen", injectFitButton);

})();

/* ---------- FIT / COVER BUTTON (REAL WORKING) ---------- */
let isCover = false;

function injectFitButton(){
  const wait = setInterval(()=>{
    const right = document.querySelector(".jw-controlbar-right-group");
    if(!right) return;

    if(right.querySelector(".jw-fit-btn")){
      clearInterval(wait);
      return;
    }

    clearInterval(wait);

    const btn = document.createElement("div");
    btn.className = "jw-fit-btn";
    btn.title = "Fit / Cover";

    btn.innerHTML = `
      <svg viewBox="0 0 24 24">
        <path d="M3 3h7v2H5v5H3V3m18 0v7h-2V5h-5V3h7M3 21v-7h2v5h5v2H3m18-7v7h-7v-2h5v-5h2Z"/>
      </svg>
    `;

    btn.onclick = () => {
      isCover = !isCover;
      jwplayer().setConfig({
        stretching: isCover ? "fill" : "uniform"
      });
      btn.style.opacity = isCover ? "1" : ".7";
    };

    const fs = right.querySelector(".jw-icon-fullscreen");
    right.insertBefore(btn, fs);
  }, 200);
}
</script>
</body>
</html>
